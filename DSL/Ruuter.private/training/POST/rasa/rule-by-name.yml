declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'RULE-BY-NAME'"
  method: post
  accepts: json
  returns: json
  namespace: training

assign_values:
  assign:
    params: ${incoming.body}

getRulesWithName:
  call: http.post
  args:
    url: "[#TRAINING_OPENSEARCH]/rules/_search/template"
    body:
      id: "rule-with-name"
      params: ${params}
  result: getRulesResult

log_rules_data_igor:
  log: ${getRulesResult.response.body.hits.hits[0]._source.steps}a

mapRulesData:
  call: http.post
  args:
    url: "[#TRAINING_DMAPPER_HBS]/get_rule_with_name"
    headers:
      type: "json"
    body:
      hits: ${getRulesResult.response.body.hits.hits}
  result: rulesData
  next: returnSuccess

returnSuccess:
  return: ${rulesData.response.body}
  next: end
